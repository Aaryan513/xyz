        <br><br>

    <script>
        document.getElementById("clickbtn").addEventListener("click",function(){
            document.getElementById("clickresult").textcontent="button got clicked!";
        });
        document.getElementById("keyinput").addEventListener("keypress",function(event){
            document.getElementById("keyinput").textcontent="start typing :" + event.key;
        });
        document.getElementById("liveresult").addEventListener("input",function(event){

        });

</body>
