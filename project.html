<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cake shop</title>
    <link rel="stylesheet" href="project.css">
</head>
<body>
    <header>
        <h1>Sweet Dilights</h1>
        <p>Fresh and tasty cakes</p>
    </header>
    <nav>
        <a href="home">home</a>
        <a href="menu">menu</a>
        <a href="contact">contact</a>
    </nav>
    <section id="home">
        <h2>Welcome to sweet delights</h2>
        <p>We bake happiness in the form of cakes</p>
    </section>
    <section id="menu">
        <h2>our cakes</h2>
        <div class="cake-box">
            <h3>Red velvet cake</h3>
            <p>Rs.650 /1kg</p>
            <button onclick="ordercake('red velvet cake')">order</button>
        </div>
        <div class="cake-box">
            <h3>Cheese cake</h3>
            <p>Rs.900 /1kg</p>
            <button onclick="ordercake('cheese cake')">order</button>
        </div>
        <div class="cake-box">
            <h3>chocolate cake</h3>
            <p>Rs.500 /1kg</p>
            <button onclick="ordercake('chocolate cake')">order</button>
        </div>
    </section>
    <section id="contact">
        <h2>contact us</h2>
        <p> +91 9529440310</p>
        <p> +91 8879236147</p>
        <p> info@sweetdelight.com</p>
        <h3>order form</h3>
        <form id="https://formsubmit.co/aaryanpolle@gmail.com" method="post">
            <input type="text" id="name" placeholder="your name required">
            <br><br>
            <input type="tel" id="phone" placeholder="your phone number required">
            <br><br>
            <select id="cake" required>
                <option value="">select cake</option>
                <option value="chocolate cake">chocolate cake</option>
                <option value="red velvet cake">Red velvet cake</option>
                <option value="Cheese cake">cheese cake</option>
            </select>
            <br><br>
            <button type="submit">submit order</button>
        </form>
    </section>
    <script src="project.js"></script>
</body>
</html>
