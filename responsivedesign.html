<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive design</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            background: #868686;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .continer{
            background:rgb(98, 57, b57lue);
            padding: 20px;
            border-radius: 10px;
            max-width: 600px;
            min-width: 280px;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
        }
        h2{
            color: blue;

        }
        form{
            display: flex;
            flex-direction: column;
            gap: 12px;
            justify-content: center;
            align-items: center;
        }
        input,textarea,button{
            padding: 10px;
            font-size: 1rem;
            border: 1px solid#ccc;
            border-radius: 6px;
            width: 100%;
        }
        button{
            background-color: #007BFF;
            color: white;
            cursor: pointer;
            border: none;
        }
        .image-box{
            text-align: center;
            margin-bottom: 20px;
        }
        img{
            width: 100%;
            height: auto;
            border-radius: 10px;

        }
        @media(min-width:700px) {
            form{
                flex-direction: column;
                align-items: center;
            }
            input[type="text"],input[type="email"],textarea {
                width: 100%;
            }
        }

    </style>
</head>
<body>
    <div class="continer">
        <div class="image-box"></div>
        <picture>
            <source media="(max-width:600px)" srcset="free-nature-images.jpg" type="img/jpg">
            <source media="(min-width:600px)" srcset="free-nature-images.jpg" type="img/jpg">
            <img src="free-nature-images.jpg"
            srcset="free-nature-images 480w,free-nature-images 800w,free-nature-images 1200w"
            sizes="(max-width:600px) 100vw,600px"
            alt="Responsive illustration">
        </picture>
    </div>
    <h2>contact us</h2>
    <form>
        <input type="text" placeholder="your name"required>
        <input type="mail" placeholder="your email"required>
        <textarea rows="4" placeholder="your message"></textarea>
        <button type="submit">send</button>
    </form>        
</body>
</html>
